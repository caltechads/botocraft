---
primary:
  DBCluster:
    primary_key: DBClusterIdentifier
    arn_key: DBClusterArn
    name_key: DBClusterIdentifier
    input_shapes:
      - CreateDBClusterMessage
      - ModifyDBClusterMessage
    fields:
      DBClusterIdentifier:
        required: true
      Engine:
        required: true
    relations:
      subnet_group:
        primary_model_name: DocDBSubnetGroup
        docstring: >-
          Return the subnet group that this DB instance is in, if any.
        transformer:
          mapping:
            DBSubnetGroupName: >-
              self.DBSubnetGroup
      security_groups:
        primary_model_name: SecurityGroup
        docstring: >-
          Return the security groups that this DB instance is in, if any.
        many: true
        transformer:
          mapping:
            GroupIds: >-
              [g.VpcSecurityGroupId for g in self.VpcSecurityGroups if g.VpcSecurityGroupId]
      vpc:
        primary_model_name: Vpc
        docstring: >-
          Return the VPC that this DB instance is in, if any.
        transformer:
          mapping:
            VpcId: >-
              self.subnet_group.VpcId
      KmsKeyId:
        primary_model_name: KMSKey
        docstring: >-
          Return the KMS key that is used to encrypt the data in the DB cluster.
        transformer:
          mapping:
            KeyId: >-
              self.KmsKeyId

  DBSubnetGroup:
    alternate_name: DocDBSubnetGroup
    primary_key: DBSubnetGroupArn
    arn_key: DBSubnetGroupArn
    name_key: DBSubnetGroupName
    input_shapes:
      - CreateDBSubnetGroupMessage
      - ModifyDBSubnetGroupMessage
    fields:
      DBSubnetGroupName:
        required: true
      DBSubnetGroupDescription:
        required: true
      Subnets:
        required: true
      VpcId:
        required: true
      SubnetGroupStatus:
        default: >-
          "Complete"
secondary:
  CreateDBInstanceResult:
    fields:
      DBInstance:
        rename: RDSDBInstance
  ModifyDBInstanceResult:
    fields:
      DBInstance:
        rename: RDSDBInstance
  DeleteDBInstanceResult:
    fields:
      DBInstance:
        rename: RDSDBInstance
  AvailabilityZone:
    alternate_name: RDSAvailabilityZone
  Endpoint:
    alternate_name: RDSEndpoint
  Subnet:
    alternate_name: RDSSubnet
  MasterUserSecret:
    alternate_name: RDSMasterUserSecret
  CertificateDetails:
    alternate_name: RDSCertificateDetails
  PendingModifiedValues:
    alternate_name: RDSPendingModifiedValues
  PendingCloudwatchLogsExports:
    alternate_name: RDSPendingCloudwatchLogsExports
  TagSpecification:
    alternate_name: RDSTagSpecification