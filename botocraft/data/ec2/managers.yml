Instance:
  mixins:
    - name: EC2TagsManagerMixin
      import_path: botocraft.mixins.ec2
  methods:
    create:
      boto3_name: run_instances
      response_attr: Instances
      args:
        DryRun:
          default: "False"
        SecurityGroups:
          hidden: true
        AdditionalInfo:
          hidden: true
        DisableApiTermination:
          explicit: true
          default: "False"
        DisableApiStop:
          explicit: true
          default: "False"
        InstanceInitiatedShutdownBehavior:
          explicit: true
          default: >-
            "terminate"
        TagSpecifications:
          rename: Tags
          python_type: >-
            "builtins.list[Tag] | None"
          source_arg: >-
            self.serialize(self.convert_tags(model.Tags, 'instance'))
    get:
      boto3_name: describe_instances
      response_attr: Reservations
      return_type: >-
        "Reservation | None"
      args:
        Filters:
          hidden: true
        DryRun:
          default: "False"
        InstanceIds:
          required: true
          rename: InstanceId
          python_type: str
          source_arg: "[InstanceId]"
          docstring: >-
            The IDs of the instance.
      decorators:
        - name: ec2_instance_only
          import_path: botocraft.mixins.ec2
    list:
      boto3_name: describe_instances
      response_attr: Reservations
      return_type: >-
        "builtins.list[Reservation]"
      args:
        DryRun:
          default: "False"
      decorators:
        - name: ec2_instances_only
          import_path: botocraft.mixins.ec2
    start:
      boto3_name: start_instances
      response_attr: StartingInstances
      return_type: >-
        "builtins.list[InstanceStateChange] | None"
      args:
        InstanceIds:
          required: true
        Hibernate:
          default: "False"
        DryRun:
          default: "False"
        Force:
          default: "False"
    stop:
      boto3_name: stop_instances
      response_attr: StoppingInstances
      return_type: >-
        "builtins.list[InstanceStateChange] | None"
      args:
        InstanceIds:
          required: true
        DryRun:
          default: "False"
    reboot:
      boto3_name: reboot_instances
      args:
        InstanceIds:
          required: true
        Hibernate:
          default: "False"
        DryRun:
          default: "False"
        Force:
          default: "False"
    terminate:
      boto3_name: terminate_instances
      return_type: >-
        "builtins.list[InstanceStateChange] | None"
      response_attr: TerminatingInstances
      args:
        InstanceIds:
          required: true
        DryRun:
          default: "False"
