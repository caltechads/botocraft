      import_path: botocraft.mixins.ec2
  methods:
    create:
      boto3_name: create_image
      response_attr: ImageId
      args:
        InstanceId:
          source_attr: SourceInstanceId
        DryRun:
          default: "False"
        TagSpecifications:
          rename: Tags
          python_type: "builtins.list[Tag] | None"
          source_arg: >-
            self.serialize(self.convert_tags(model.Tags, 'image'))
    delete:
      boto3_name: deregister_image
      args:
        ImageId:
          required: true
        DryRun:
          default: "False"
    get:
      boto3_name: describe_images
      args:
        Filters:
          hidden: true
        DryRun:
          default: "False"
        ImageIds:
          required: true
          rename: ImageId
          python_type: str
          source_arg: "[ImageId]"
          docstring: >-
            The IDs of the images.
    list:
      boto3_name: describe_images
      args:
        DryRun:
          default: "False"
    copy:
      boto3_name: copy_image
      response_attr: ImageId
      args:
        SourceImageId:
          required: true
        ClientToken:
          required: true
        Name:
          required: true
        TagSpecifications:
          docstring: >-
            The tags to apply to the new AMI and new snapshots. You can tag the AMI, the snapshots, or both.  To tag the new AMI, the value for ``ResourceType`` must be "image" To tag the new snapshots, the value for ``ResourceType`` must be "snapshot". The same tag is applied to all the new snapshots.
    enable_deregistration_protection:
      boto3_name: enable_image_deregistration_protection
      response_attr: Return
      args:
        ImageId:
          required: true
        WithCooldown:
          default: "False"
        DryRun:
          default: "False"
    disable_deregistration_protection:
