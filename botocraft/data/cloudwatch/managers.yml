Metric:
  readonly: true
  mixins:
    - name: CloudWatchMetricManagerMixin
      import_path: botocraft.mixins.cloudwatch
  methods:
    list:
      boto3_name: list_metrics
      response_attr: Metrics
    publish:
      boto3_name: put_metric_data
      return_type: None
      response_attr: None
      args:
        Namespace:
          hidden: true
        MetricData:
          required: true
          explicit: true
      extra_args:
        model:
          python_type: '"CloudWatchMetric"'
          required: true
          explicit: true
    get_data:
      boto3_name: get_metric_data
      return_type: list[Any]
      response_attr: MetricDataResults
      args:
        MetricDataQueries:
          hidden: true
      extra_args:
        model:
          python_type: '"CloudWatchMetric"'
          required: true
          explicit: true
        Period:
          python_type: CloudWatchGetDataPeriod
          required: true
          explicit: true
          imports:
            - from botocraft.mixins.cloudwatch import CloudWatchGetDataPeriod
          docstring: >-
            Aggregation period in seconds. Must be one of 1, 5, 10, 20, 30, 60,
            120, 300, 600, 900, 1800, 3600, 10800, 21600, 43200, or 86400.
        Stat:
          python_type: CloudWatchGetDataStat
          required: true
          explicit: true
          imports:
            - from botocraft.mixins.cloudwatch import CloudWatchGetDataStat
          docstring: >-
            Statistic for the query. Standard values are SampleCount, Average,
            Sum, Minimum, and Maximum. Extended percentiles use a p prefix, for
            example p99 or p95.0 (p0 through p100 and common decimal forms).
        Unit:
          python_type: CloudWatchMetricUnit | None
          required: false
          default: None
          imports:
            - from botocraft.mixins.cloudwatch import CloudWatchMetricUnit
          docstring: >-
            Optional unit filter. When omitted, CloudWatch may return data stored
            under any unit. When set, must be a standard unit such as Seconds,
            Count, Percent, Bytes, or Bytes/Second.
    get_statistics:
      boto3_name: get_metric_statistics
      return_type: list[Any]
      response_attr: Datapoints
      args:
        Namespace:
          hidden: true
        MetricName:
          hidden: true
        Dimensions:
          hidden: true
      extra_args:
        model:
          python_type: '"CloudWatchMetric"'
          required: true
          explicit: true
    widget_image:
      boto3_name: get_metric_widget_image
      return_type: bytes
      response_attr: MetricWidgetImage
