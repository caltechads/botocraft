---
primary:
  DomainStatus:
    alternate_name: OpenSearchDomain
    primary_key: DomainName
    arn_key: ARN
    name_key: DomainName
    input_shapes:
      - CreateDomainRequest
    mixins:
      - name: DomainModelMixin
        import_path: botocraft.mixins.opensearch
    extra_fields:
      Tags:
        python_type: builtins.list[Tag]
        docstring: >-
          The tags associated with the OpenSearch domain.
    relations:
      vpc:
        primary_model_name: Vpc
        docstring: >-
          Return the VPC that this OpenSearch domain is in, if any.
        transformer:
          mapping:
            VpcId: >-
              self.VPCOptions.VPCId if self.VPCOptions else None
      subnets:
        primary_model_name: Subnet
        docstring: >-
          Return the EC2 subnets associated with this OpenSearch domain, if any.
        many: true
        transformer:
          mapping:
            SubnetIds: >-
              list(self.VPCOptions.SubnetIds) if self.VPCOptions and self.VPCOptions.SubnetIds else []
      security_groups:
        primary_model_name: SecurityGroup
        docstring: >-
          Return the EC2 security groups associated with this OpenSearch domain,
          if any.
        many: true
        transformer:
          mapping:
            GroupIds: >-
              list(self.VPCOptions.SecurityGroupIds) if self.VPCOptions and self.VPCOptions.SecurityGroupIds else []
  VpcEndpoint:
    alternate_name: OpenSearchVpcEndpoint
    primary_key: VpcEndpointId
    name_key: VpcEndpointId
    input_shapes:
      - CreateVpcEndpointRequest
      - UpdateVpcEndpointRequest
    relations:
      domain:
        primary_model_name: OpenSearchDomain
        docstring: >-
          Return the OpenSearch domain associated with this VPC endpoint, if any.
        transformer:
          mapping:
            DomainName: >-
              self.DomainArn.rsplit("/", 1)[-1] if self.DomainArn else None
      vpc:
        primary_model_name: Vpc
        docstring: >-
          Return the VPC that this OpenSearch VPC endpoint is in, if any.
        transformer:
          mapping:
            VpcId: >-
              self.VpcOptions.VPCId if self.VpcOptions else None
      subnets:
        primary_model_name: Subnet
        docstring: >-
          Return the EC2 subnets associated with this OpenSearch VPC endpoint, if
          any.
        many: true
        transformer:
          mapping:
            SubnetIds: >-
              list(self.VpcOptions.SubnetIds) if self.VpcOptions and self.VpcOptions.SubnetIds else []
      security_groups:
        primary_model_name: SecurityGroup
        docstring: >-
          Return the EC2 security groups associated with this OpenSearch VPC
          endpoint, if any.
        many: true
        transformer:
          mapping:
            GroupIds: >-
              list(self.VpcOptions.SecurityGroupIds) if self.VpcOptions and self.VpcOptions.SecurityGroupIds else []
  PackageDetails:
    alternate_name: OpenSearchPackage
    primary_key: PackageID
    name_key: PackageName
    input_shapes:
      - CreatePackageRequest
      - UpdatePackageRequest
