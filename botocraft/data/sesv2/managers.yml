---
GetConfigurationSetResponse:
  methods:
    create:
      boto3_name: create_configuration_set
      return_type: None
      response_attr: None
      decorators:
        - name: refresh_configuration_set_after_mutation
          import_path: botocraft.mixins.sesv2
    get:
      boto3_name: get_configuration_set
      response_attr: None
      args:
        ConfigurationSetName:
          required: true
    list:
      boto3_name: list_configuration_sets
      response_attr: ConfigurationSets
      decorators:
        - name: configuration_set_names_to_models
          import_path: botocraft.mixins.sesv2
    delete:
      boto3_name: delete_configuration_set
      return_type: None
      response_attr: None
      args:
        ConfigurationSetName:
          required: true

IdentityInfo:
  mixins:
    - name: SESV2EmailIdentityManagerMixin
      import_path: botocraft.mixins.sesv2
  methods:
    create:
      boto3_name: create_email_identity
      return_type: None
      response_attr: None
      decorators:
        - name: refresh_email_identity_after_mutation
          import_path: botocraft.mixins.sesv2
    get:
      boto3_name: get_email_identity
      response_attr: None
      decorators:
        - name: email_identity_response_to_model
          import_path: botocraft.mixins.sesv2
      args:
        EmailIdentity:
          required: true
          rename: identity
          python_type: str
    list:
      boto3_name: list_email_identities
      response_attr: EmailIdentities
      decorators:
        - name: email_identity_summaries_to_models
          import_path: botocraft.mixins.sesv2
    delete:
      boto3_name: delete_email_identity
      return_type: None
      response_attr: None
      args:
        EmailIdentity:
          required: true
          rename: identity
          python_type: str
    send:
      boto3_name: send_email
      response_attr: MessageId
      args:
        FromEmailAddress:
          required: true
        Content:
          required: true
        Destination:
          default: None
        ReplyToAddresses:
          default: None
        FeedbackForwardingEmailAddress:
          default: None
        FeedbackForwardingEmailAddressIdentityArn:
          default: None
        FromEmailAddressIdentityArn:
          default: None
        EmailTags:
          default: None
        ConfigurationSetName:
          default: None
        ListManagementOptions:
          default: None
        EndpointId:
          default: None
        TenantName:
          default: None
    send_bulk:
      boto3_name: send_bulk_email
      return_type: '"builtins.list[BulkEmailEntryResult]"'
      response_attr: BulkEmailEntryResults
      args:
        FromEmailAddress:
          required: true
        DefaultContent:
          required: true
        BulkEmailEntries:
          required: true
        ReplyToAddresses:
          default: None
        FeedbackForwardingEmailAddress:
          default: None
        FeedbackForwardingEmailAddressIdentityArn:
          default: None
        FromEmailAddressIdentityArn:
          default: None
        DefaultEmailTags:
          default: None
        ConfigurationSetName:
          default: None
        EndpointId:
          default: None
        TenantName:
          default: None

