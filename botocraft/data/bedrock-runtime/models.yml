---
primary:
  ConverseResponse:
    alternate_name: Conversation
    readonly: true
    primary_key: stopReason
  ApplyGuardrailResponse:
    alternate_name: GuardrailApplication
    readonly: true
    primary_key: action
secondary:
  CountTokensResponse:
    alternate_name: TokenCount
  ConverseStreamOutput:
    force_create: true
  ConverseStreamResponse:
    imports:
      - from botocraft.mixins.bedrock_runtime import ConverseStreamResponseMixin
      - from botocraft.mixins.bedrock_runtime import ConverseStream
    mixins:
      - name: ConverseStreamResponseMixin
        import_path: botocraft.mixins.bedrock_runtime
    fields:
      stream:
        python_type: '"ConverseStream | None"'
  InvokeModelWithResponseStreamResponse:
    imports:
      - from botocraft.mixins.bedrock_runtime import InvokeModelWithResponseStreamResponseMixin
      - from botocraft.mixins.bedrock_runtime import InvokeModelResponseStream
    mixins:
      - name: InvokeModelWithResponseStreamResponseMixin
        import_path: botocraft.mixins.bedrock_runtime
    fields:
      body:
        python_type: '"InvokeModelResponseStream"'
  Message:
    alternate_name: BedrockMessage
  ResponseStream:
    force_create: true
  ToolResultBlockDelta:
    fields:
      json:
        rename: jsonData
  ToolResultContentBlock:
    fields:
      json:
        rename: jsonData
  ToolInputSchema:
    fields:
      json:
        rename: jsonSchema
  JsonSchemaDefinition:
    fields:
      schema:
        rename: schemaDefinition
  AudioSource:
    fields:
      bytes:
        rename: data
  BidirectionalInputPayloadPart:
    fields:
      bytes:
        rename: data
  BidirectionalOutputPayloadPart:
    fields:
      bytes:
        rename: data
  DocumentSource:
    fields:
      bytes:
        rename: data
  GuardrailConverseImageSource:
    fields:
      bytes:
        rename: data
  GuardrailImageSource:
    fields:
      bytes:
        rename: data
  ImageSource:
    fields:
      bytes:
        rename: data
  PayloadPart:
    fields:
      bytes:
        rename: data
  VideoSource:
    fields:
      bytes:
        rename: data
