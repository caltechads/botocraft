DescribeAgentResponse:
  methods:
    create:
      boto3_name: create_agent
      response_attr: None
      return_type: '"DataSyncAgent | None"'
      decorators:
        - name: datasync_refresh_after_create
          import_path: botocraft.mixins.datasync
      args:
        AgentName:
          attribute: Name
    get:
      boto3_name: describe_agent
      response_attr: None
      decorators:
        - name: datasync_add_tags
          import_path: botocraft.mixins.datasync
      args:
        AgentArn:
          required: true
    list:
      boto3_name: list_agents
      response_attr: Agents
      decorators:
        - name: datasync_add_tags_to_queryset
          import_path: botocraft.mixins.datasync
    update:
      boto3_name: update_agent
      response_attr: None
      return_type: '"DataSyncAgent | None"'
      decorators:
        - name: datasync_refresh_after_update
          import_path: botocraft.mixins.datasync
      args:
        AgentArn:
          required: true
    delete:
      boto3_name: delete_agent
      return_type: None
      args:
        AgentArn:
          required: true

