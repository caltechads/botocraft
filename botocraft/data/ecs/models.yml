---
primary:
  CapacityProvider:
    primary_key: capacityProviderArn
    arn_key: capacityProviderArn
    name_key: Name
    input_shapes:
      - CreateCapacityProviderRequest
    fields:
      name:
        rename: Name
      tags:
        rename: Tags
  Service:
    arn_key: serviceArn
    name_key: serviceName
    input_shapes:
      - CreateServiceRequest
      - UpdateServiceRequest
    mixins:
      - name: ECSServiceModelMixin
        import_path: botocraft.mixins.ecs
    fields:
      serviceName:
        required: true
      taskDefinition:
        required: true
      clusterArn:
        required: true
      desiredCount:
        required: true
        default: 1
      launchType:
        required: true
        default: >-
          "FARGATE"
      schedulingStrategy:
        required: true
        default: >-
          "REPLICA"
      tags:
        rename: Tags
    properties:
      pk:
        docstring: >-
          The primary key of the service.  This can be used to get the service
          with the :py:meth:`botocraft.services.ecs.ServiceManager.get` method,
          or to do
          :py:meth:`botocraft.services.ecs.ServiceManager.partial_update`.
        transformer:
          mapping:
            service: serviceName
            cluster: clusterArn
      cluster_name:
        docstring: >-
          The name of the cluster that houses this service.
        transformer:
          regex:
            attribute: clusterArn
            regex: >-
              ^.*:cluster/(.+)$
            cluster: clusterArn
    relations:
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that this service belongs to, if
          any.
        transformer:
          mapping:
            cluster: clusterArn
      task_definition:
        primary_model_name: TaskDefinition
        docstring: >-
          Return the :py:class:`TaskDefinition` object that this service uses, if
          any.
        transformer:
          mapping:
            taskDefinition: taskDefinition
      tasks:
        primary_model_name: Task
        cached: false
        many: true
        docstring: >-
          Return the ARNs of :py:class:`Task` objects that run in this service, if
          any.
        transformer:
          mapping:
            serviceName: serviceName
            cluster: clusterArn
      target_groups:
        primary_model_name: TargetGroup
        many: true
        docstring: >-
          Return the target groups that are associated with this service, if any.
        transformer:
          mapping:
            TargetGroupArns: >-
              [lb.targetGroupArn for lb in self.loadBalancers if lb.targetGroupArn]
      scalable_targets:
        primary_model_name: ScalableTarget
        many: true
        docstring: >-
          Return the scalable targets that are associated with this service, if any.
        transformer:
          mapping:
            ServiceNamespace: >-
              "ecs"
            ResourceIds: >-
              f"service/{self.cluster_name}/{self.serviceName}"
      service_deployments:
        primary_model_name: ServiceDeployment
        many: true
        docstring: >-
          Return the ARNs of :py:class:`ServiceDeployment` objects that run in this
          service, if any.
        transformer:
          mapping:
            service: serviceName
            cluster: clusterArn
      current_service_deployment:
        primary_model_name: ServiceDeployment
        docstring: >-
          Return the current :py:class:`ServiceDeployment` object for this
          service, if any.
        transformer:
          mapping:
            serviceDeploymentArn: currentServiceDeployment
      current_service_revisions:
        primary_model_name: ServiceRevision
        many: true
        docstring: >-
          Return the current :py:class:`ServiceRevision` objects for this
          service, if any.
        transformer:
          mapping:
            serviceRevisionArns: >-
              [revision.arn for revision in self.currentServiceRevisions if revision.arn]
      task_sets:
        primary_model_name: TaskSet
        many: true
        docstring: >-
          Return the :py:class:`TaskSet` objects associated with this service,
          if any. Task sets are used only when the service deployment
          controller is ``EXTERNAL``; services that use the ``ECS``
          deployment controller do not populate :py:attr:`taskSets` on
          describe responses, so this property is usually empty for them.
        transformer:
          mapping:
            service: serviceName
            cluster: clusterArn
            taskSets: >-
              [task_set.taskSetArn for task_set in self.taskSets if task_set.taskSetArn]
  Cluster:
    primary_key: clusterArn
    arn_key: clusterArn
    name_key: clusterName
    input_shapes:
      - CreateClusterRequest
    fields:
      clusterName:
        required: true
        default: >-
          "default"
      tags:
        rename: Tags
    properties:
      cluster_name:
        docstring: >-
          The name of the cluster.
        transformer:
          alias: clusterName
    relations:
      services:
        primary_model_name: Service
        many: true
        docstring: >-
          Return the ARNs of :py:class:`Service` objects that run in this cluster, if
          any.
        transformer:
          mapping:
            cluster: clusterArn
      container_instances:
        primary_model_name: ContainerInstance
        many: true
        docstring: >-
          Return the ARNs of :py:class:`ContainerInstance` objects that run in this
          cluster, if any.
        transformer:
          mapping:
            cluster: clusterArn
      capacity_providers:
        primary_model_name: CapacityProvider
        many: true
        docstring: >-
          Return the :py:class:`CapacityProvider` objects associated with this
          cluster, if any.
        transformer:
          mapping:
            capacityProviders: capacityProviders
            cluster: cluster_name
  TaskDefinition:
    primary_key: taskDefinitionArn
    arn_key: taskDefinitionArn
    input_shapes:
      - RegisterTaskDefinitionRequest
    mixins:
      - name: TaskDefinitionModelMixin
        import_path: botocraft.mixins.ecs
    fields:
      family:
        required: true
      containerDefinitions:
        required: true
      networkMode:
        default: >-
          "awsvpc"
    extra_fields:
      Tags:
        python_type: "builtins.list[ECSTag]"
        required: false
        docstring: >-
          The tags for the task definition.
    manager_methods:
      deregister:
        manager_method: deregister
        docstring: >-
          Deregisters the specified task definition by family and revision. Upon
          deregistration, the task definition is marked as ``INACTIVE``. Existing tasks
          and services that reference an ``INACTIVE`` task definition continue to run
          without disruption. Existing services that reference an ``INACTIVE`` task
          definition can still scale up or down by modifying the service's desired count.
          If you want to delete a task definition revision, you must first deregister the
          task definition revision.
        args:
          0:
            name: taskDefinition
            value: >-
              self.taskDefinitionArn

  Task:
    primary_key: taskArn
    arn_key: taskArn
    input_shapes:
      - RunTaskRequest
    fields:
      tags:
        rename: Tags
      clusterArn:
        required: true
        readonly: false
      platformVersion:
        default: >-
          "LATEST"
      launchType:
        default: >-
          "FARGATE"
    extra_fields:
      taskDefinition:
        python_type: str
        docstring: >-
          The `family` and `revision` (`family:revision`) or full ARN of the
          task definition to run. If a `revision` isn't specified, the latest
          `ACTIVE` revision is used.
    properties:
      serviceName:
        docstring: >-
          The name of the service that ran this task, if any.
        transformer:
          regex:
            attribute: group
            regex: >-
              ^service:(.+)$
    relations:
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that this task belongs to, if any.
        transformer:
          mapping:
            cluster: clusterArn
      task_definition:
        primary_model_name: TaskDefinition
        docstring: >-
          Return the :py:class:`TaskDefinition` object that this task uses, if any.
        transformer:
          mapping:
            taskDefinition: taskDefinition
      container_instance:
        primary_model_name: ContainerInstance
        docstring: >-
          Return the :py:class:`ContainerInstance` object that runs this task, if any.
        transformer:
          mapping:
            containerInstance: containerInstanceArn
            cluster: clusterArn
      service:
        primary_model_name: Service
        docstring: >-
          Return the :py:class:`Service` object that runs this task, if any.
        transformer:
          mapping:
            service: serviceName
            cluster: clusterArn
      capacity_provider:
        primary_model_name: CapacityProvider
        docstring: >-
          Return the :py:class:`CapacityProvider` object that runs this task,
          if any.
        transformer:
          mapping:
            capacityProvider: capacityProviderName
            cluster: clusterArn
  ContainerInstance:
    primary_key: containerInstanceArn
    arn_key: containerInstanceArn
    mixins:
      - name: ECSContainerInstanceModelMixin
        import_path: botocraft.mixins.ecs
    readonly: true
    fields:
      tags:
        rename: Tags
    properties:
      clusterName:
        docstring: >-
          The name of the cluster that houses this task, if any.
        transformer:
          regex:
            attribute: containerInstanceArn
            regex: >-
              :container-instance/(.+)/[0-9a-f]+$
      name:
        docstring: >-
          The name of the cluster that houses this task, if any.
        transformer:
          regex:
            attribute: containerInstanceArn
            regex: >-
              :container-instance/.+/([0-9a-f]+)$
    relations:
      instance:
        primary_model_name: Instance
        docstring: >-
          Return the :py:class:`Instance` object that this container instance
          represents, if any.
        transformer:
          mapping:
            InstanceId: ec2InstanceId
      tasks:
        primary_model_name: Task
        many: true
        cached: false
        docstring: >-
          Return the ARNs of :py:class:`Task` objects that run on this container
          instance, if any.
        transformer:
          mapping:
            cluster: clusterName
            containerInstance: containerInstanceArn
            desiredStatus: >-
              "RUNNING"
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that this container instance
          belongs to, if any.
        transformer:
          mapping:
            cluster: clusterName
      capacity_provider:
        primary_model_name: CapacityProvider
        docstring: >-
          Return the :py:class:`CapacityProvider` object associated with this
          container instance, if any.
        transformer:
          mapping:
            capacityProvider: capacityProviderName
            cluster: clusterName
  ServiceRevision:
    primary_key: serviceRevisionArn
    arn_key: serviceRevisionArn
    readonly: true
    relations:
      service:
        primary_model_name: Service
        docstring: >-
          Return the :py:class:`Service` object for this service revision, if
          any.
        transformer:
          mapping:
            service: serviceArn
            cluster: clusterArn
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object for this service revision, if
          any.
        transformer:
          mapping:
            cluster: clusterArn
      task_definition:
        primary_model_name: TaskDefinition
        docstring: >-
          Return the :py:class:`TaskDefinition` object for this service
          revision, if any.
        transformer:
          mapping:
            taskDefinition: taskDefinition
  ServiceDeployment:
    primary_key: serviceDeploymentArn
    arn_key: serviceDeploymentArn
    readonly: true
    relations:
      service:
        primary_model_name: Service
        docstring: >-
          Return the :py:class:`Service` object that owns this deployment, if
          any.
        transformer:
          mapping:
            service: serviceArn
            cluster: clusterArn
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that owns this deployment, if
          any.
        transformer:
          mapping:
            cluster: clusterArn
      target_service_revision:
        primary_model_name: ServiceRevision
        docstring: >-
          Return the target :py:class:`ServiceRevision` object for this
          deployment, if any.
        transformer:
          mapping:
            serviceRevisionArn: >-
              self.targetServiceRevision.arn
      source_service_revisions:
        primary_model_name: ServiceRevision
        many: true
        docstring: >-
          Return the source :py:class:`ServiceRevision` objects for this
          deployment, if any.
        transformer:
          mapping:
            serviceRevisionArns: >-
              [revision.arn for revision in self.sourceServiceRevisions if revision.arn]
      target_task_definition:
        primary_model_name: TaskDefinition
        docstring: >-
          Return the :py:class:`TaskDefinition` object that this deployment uses,
          if any.
        transformer:
          mapping:
            taskDefinition: >-
              self.target_service_revision.taskDefinition
  DaemonDetail:
    alternate_name: Daemon
    primary_key: daemonArn
    arn_key: daemonArn
    extra_fields:
      daemonName:
        python_type: str | None
        default: None
        docstring: >-
          The name to assign to the daemon when creating it.
      daemonTaskDefinitionArn:
        python_type: str | None
        default: None
        docstring: >-
          The daemon task definition ARN to use for this daemon.
      capacityProviderArns:
        python_type: builtins.list[str] | None
        default: None
        docstring: >-
          The capacity provider ARNs that back this daemon.
      deploymentConfiguration:
        python_type: dict[str, builtins.object] | None
        default: None
        docstring: >-
          The deployment configuration to apply when creating or updating this
          daemon.
      propagateTags:
        python_type: str | None
        default: None
        docstring: >-
          Controls how tags are propagated to daemon tasks.
      enableECSManagedTags:
        python_type: bool | None
        default: None
        docstring: >-
          Whether ECS managed tags are enabled for daemon tasks.
      enableExecuteCommand:
        python_type: bool | None
        default: None
        docstring: >-
          Whether ECS Exec is enabled for daemon tasks.
      Tags:
        python_type: "builtins.list[ECSTag] | None"
        default: None
        docstring: >-
          The tags associated with this daemon.
    relations:
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that owns this daemon, if any.
        transformer:
          mapping:
            cluster: clusterArn
      current_revisions:
        primary_model_name: DaemonRevision
        many: true
        docstring: >-
          Return the current :py:class:`DaemonRevision` objects for this daemon,
          if any.
        transformer:
          mapping:
            daemonRevisionArns: >-
              [revision.arn for revision in self.currentRevisions if revision.arn]
  DaemonTaskDefinition:
    primary_key: daemonTaskDefinitionArn
    arn_key: daemonTaskDefinitionArn
    input_shapes:
      - RegisterDaemonTaskDefinitionRequest
    extra_fields:
      Tags:
        python_type: "builtins.list[ECSTag] | None"
        default: None
        docstring: >-
          The tags associated with this daemon task definition.
  DaemonRevision:
    primary_key: daemonRevisionArn
    arn_key: daemonRevisionArn
    readonly: true
    relations:
      daemon:
        primary_model_name: Daemon
        docstring: >-
          Return the :py:class:`Daemon` object for this daemon revision, if any.
        transformer:
          mapping:
            daemonArn: daemonArn
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object for this daemon revision, if any.
        transformer:
          mapping:
            cluster: clusterArn
      daemon_task_definition:
        primary_model_name: DaemonTaskDefinition
        docstring: >-
          Return the :py:class:`DaemonTaskDefinition` object for this daemon
          revision, if any.
        transformer:
          mapping:
            daemonTaskDefinition: daemonTaskDefinitionArn
  DaemonDeploymentSummary:
    alternate_name: DaemonDeployment
    primary_key: daemonDeploymentArn
    arn_key: daemonDeploymentArn
    readonly: true
    relations:
      daemon:
        primary_model_name: Daemon
        docstring: >-
          Return the :py:class:`Daemon` object that owns this deployment, if
          any.
        transformer:
          mapping:
            daemonArn: daemonArn
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that owns this daemon deployment,
          if any.
        transformer:
          mapping:
            cluster: clusterArn
      target_revision:
        primary_model_name: DaemonRevision
        docstring: >-
          Return the target :py:class:`DaemonRevision` object for this daemon
          deployment, if any.
        transformer:
          mapping:
            daemonRevisionArn: targetDaemonRevisionArn
  ECSExpressGatewayService:
    alternate_name: ExpressGatewayService
    primary_key: serviceArn
    arn_key: serviceArn
    name_key: serviceName
    input_shapes:
      - CreateExpressGatewayServiceRequest
      - UpdateExpressGatewayServiceRequest
    fields:
      cluster:
        rename: clusterArn
      tags:
        rename: Tags
    extra_fields:
      executionRoleArn:
        python_type: str | None
        default: None
        docstring: >-
          The execution role ARN to use for this Express gateway service.
      taskRoleArn:
        python_type: str | None
        default: None
        docstring: >-
          The task role ARN to use for this Express gateway service.
      healthCheckPath:
        python_type: str | None
        default: None
        docstring: >-
          The health check path to use for this Express gateway service.
      primaryContainer:
        python_type: ExpressGatewayContainer | None
        default: None
        docstring: >-
          The primary container configuration for this Express gateway service.
      networkConfiguration:
        python_type: ExpressGatewayServiceNetworkConfiguration | None
        default: None
        docstring: >-
          The network configuration for this Express gateway service.
      cpu:
        python_type: str | None
        default: None
        docstring: >-
          The CPU units for this Express gateway service.
      memory:
        python_type: str | None
        default: None
        docstring: >-
          The memory setting for this Express gateway service.
      scalingTarget:
        python_type: ExpressGatewayScalingTarget | None
        default: None
        docstring: >-
          The autoscaling target configuration for this Express gateway service.
    relations:
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that owns this Express gateway
          service, if any.
        transformer:
          mapping:
            cluster: clusterArn
      service:
        primary_model_name: Service
        docstring: >-
          Return the backing :py:class:`Service` object for this Express gateway
          service, if any.
        transformer:
          mapping:
            service: serviceArn
            cluster: clusterArn
      active_service_revisions:
        primary_model_name: ServiceRevision
        many: true
        docstring: >-
          Return the active :py:class:`ServiceRevision` objects for this Express
          gateway service, if any.
        transformer:
          mapping:
            serviceRevisionArns: >-
              [config.serviceRevisionArn for config in self.activeConfigurations if config.serviceRevisionArn]
  TaskSet:
    primary_key: taskSetArn
    arn_key: taskSetArn
    docstring: >-
      Describes a task set for a service that uses the ``EXTERNAL`` deployment
      controller. Standard ``ECS`` deployment-controller services do not use
      task sets.
    input_shapes:
      - CreateTaskSetRequest
    fields:
      tags:
        rename: Tags
    relations:
      service:
        primary_model_name: Service
        docstring: >-
          Return the :py:class:`Service` object that owns this task set, if
          any.
        transformer:
          mapping:
            service: serviceArn
            cluster: clusterArn
      cluster:
        primary_model_name: Cluster
        docstring: >-
          Return the :py:class:`Cluster` object that owns this task set, if
          any.
        transformer:
          mapping:
            cluster: clusterArn
      task_definition:
        primary_model_name: TaskDefinition
        docstring: >-
          Return the :py:class:`TaskDefinition` object for this task set, if
          any.
        transformer:
          mapping:
            taskDefinition: taskDefinition

secondary:
  Deployment:
    readonly: true
  ContainerDefinition:
    fields:
      name:
        required: true
      image:
        required: true
      essential:
        required: true
        default: >-
          True
      secrets:
        python_type: >-
          "builtins.list[ECSContainerDefinitionSecret] | None"
    properties:
      full_repository_uri:
        docstring: >-
          The full repository URI of the image that this container definition uses.  For example: ``123456789012.dkr.ecr.us-east-1.amazonaws.com/my-group/my-image``.
        transformer:
          regex:
            attribute: image
            regex: >-
              ^(.+):.+$
      repository_name:
        docstring: >-
          The name of the repository that houses the image that this container
          definition uses.  For example: ``my-group/my-image``.
        transformer:
          regex:
            attribute: image
            regex: >-
              ^.+?/(.+):.+$
      image_tag:
        docstring: >-
          The tag of the image that this container definition uses.  For example: ``latest``.
        transformer:
          regex:
            attribute: image
            regex: >-
              ^.+:(.+)$
    relations:
      image_object:
        primary_model_name: ECRImage
        imports:
          - name: ImageIdentifier
            import_path: botocraft.services.ecr
        docstring: >-
          Return the :class:`~botocraft.services.ecr.ECRImage` object that this container definition uses.
        transformer:
          mapping:
            repositoryName: repository_name
            imageId: >-
              ImageIdentifier(imageTag=self.image_tag)
  LoadBalancer:
    alternate_name: LoadBalancerConfiguration
  ProxyConfiguration:
    alternate_name: ECSProxyConfiguration
  VCpuCountRangeRequest:
    alternate_name: ECSVCpuCountRangeRequest
  MemoryMiBRequest:
    alternate_name: ECSMemoryMiBRequest
  MemoryGiBPerVCpuRequest:
    alternate_name: ECSMemoryGiBPerVCpuRequest
  NetworkInterfaceCountRequest:
    alternate_name: ECSNetworkInterfaceCountRequest
  TotalLocalStorageGBRequest:
    alternate_name: ECSTotalLocalStorageGBRequest
  BaselineEbsBandwidthMbpsRequest:
    alternate_name: ECSBaselineEbsBandwidthMbpsRequest
  AcceleratorCountRequest:
    alternate_name: ECSAcceleratorCountRequest
  AcceleratorTotalMemoryMiBRequest:
    alternate_name: ECSAcceleratorTotalMemoryMiBRequest
  NetworkBandwidthGbpsRequest:
    alternate_name: ECSNetworkBandwidthGbpsRequest
  InstanceRequirementsRequest:
    alternate_name: ECSInstanceRequirementsRequest
  Tag:
    alternate_name: ECSTag
  RegisterTaskDefinitionResponse:
    fields:
      tags:
        rename: Tags
  DescribeTaskDefinitionResponse:
    fields:
      tags:
        rename: Tags
  EBSTagSpecification:
    fields:
      tags:
        rename: Tags
  Resource:
    alternate_name: ContainerInstanceResource
  RuntimePlatform:
    fields:
      cpuArchitecture:
        python_type: "Literal['x86_64', 'ARM64']"
  Secret:
    alternate_name: ECSContainerDefinitionSecret
