---
primary:
  FoundationModelSummary:
    alternate_name: FoundationModel
    readonly: true
    primary_key: modelId
    arn_key: modelArn
    name_key: modelName
    mixins:
      - name: FoundationModelRuntimeMixin
        import_path: botocraft.mixins.bedrock_runtime
    fields:
      inputModalities:
        python_type: >-
          "builtins.list[Literal['TEXT', 'IMAGE', 'EMBEDDING', 'VIDEO', 'SPEECH']] | None"
      outputModalities:
        python_type: >-
          "builtins.list[Literal['TEXT', 'IMAGE', 'EMBEDDING', 'VIDEO', 'SPEECH']] | None"
      customizationsSupported:
        python_type: >-
          "builtins.list[Literal['FINE_TUNING', 'CONTINUED_PRE_TRAINING', 'DISTILLATION']] | None"
      inferenceTypesSupported:
        python_type: >-
          "builtins.list[Literal['ON_DEMAND', 'PROVISIONED', 'INFERENCE_PROFILE']] | None"
  FoundationModelAgreement:
    bespoke: true
    primary_key: modelId
    name_key: modelId
    extra_fields:
      modelId:
        python_type: str
        required: true
        docstring: >-
          Foundation model identifier for agreement lifecycle calls.
  CustomModelSummary:
    alternate_name: CustomModel
    primary_key: modelArn
    arn_key: modelArn
    name_key: modelName
    fields:
      baseModelName:
        python_type: str | None
        required: false
        default: None
        docstring: >-
          Base model name when available from list responses.
      ownerAccountId:
        python_type: str | None
        required: false
        default: None
        docstring: >-
          Owning AWS account ID when available from list responses.
    relations:
      base_model:
        primary_model_name: FoundationModel
        docstring: >-
          Return the foundation model that this custom model was derived from, if any.
        transformer:
          mapping:
            modelId: baseModelArn
  ImportedModelSummary:
    alternate_name: ImportedModel
    primary_key: modelArn
    arn_key: modelArn
    name_key: modelName
  GetGuardrailResponse:
    alternate_name: Guardrail
    primary_key: guardrailId
    arn_key: guardrailArn
    name_key: guardrailName
    mixins:
      - name: GuardrailRuntimeMixin
        import_path: botocraft.mixins.bedrock_runtime
    fields:
      name:
        rename: guardrailName
      blockedInputMessaging:
        required: false
        default: None
      blockedOutputsMessaging:
        required: false
        default: None
    relations:
      kms_key:
        primary_model_name: KMSKey
        docstring: >-
          Return the KMS key that encrypts this guardrail, if any.
        transformer:
          mapping:
            KeyId: kmsKeyArn
    manager_methods:
      create_version:
        docstring: >-
          Create a version of this guardrail.
        manager_method: create_version
        args:
          0:
            name: guardrailIdentifier
            value: >-
              cast(str, self.guardrailId)
        user_keyword_args:
          - name: description
            attr_type: str | None
            default: >-
              None
  AutomatedReasoningPolicySummary:
    alternate_name: AutomatedReasoningPolicy
    primary_key: policyArn
    arn_key: policyArn
    name_key: policyName
    mixins:
      - name: AutomatedReasoningPolicyModelMixin
        import_path: botocraft.mixins.bedrock
    fields:
      name:
        rename: policyName
    relations:
      build_workflows:
        primary_model_name: AutomatedReasoningPolicyBuildWorkflow
        many: true
        docstring: >-
          Return the automated reasoning build workflows for this policy.
        transformer:
          mapping:
            policyArn: policyArn
      test_cases:
        primary_model_name: AutomatedReasoningPolicyTestCase
        many: true
        docstring: >-
          Return the automated reasoning test cases for this policy.
        transformer:
          mapping:
            policyArn: policyArn
    manager_methods:
      create_version:
        docstring: >-
          Create a version of this automated reasoning policy.
        manager_method: create_version
        args:
          0:
            name: policyArn
            value: >-
              cast(str, self.policyArn)
        user_args:
          1:
            name: lastUpdatedDefinitionHash
            attr_type: str
      export_version:
        docstring: >-
          Export this automated reasoning policy version.
        manager_method: export_version
        args:
          0:
            name: policyArn
            value: >-
              cast(str, self.policyArn)
      start_build_workflow:
        docstring: >-
          Start a build workflow for this automated reasoning policy.
        manager_method: start_build_workflow
        args:
          0:
            name: policyArn
            value: >-
              cast(str, self.policyArn)
        user_args:
          1:
            name: buildWorkflowType
            attr_type: str
          2:
            name: sourceContent
            attr_type: >-
              "AutomatedReasoningPolicyBuildWorkflowSource"
        user_keyword_args:
          - name: clientRequestToken
            attr_type: str | None
            default: >-
              None
  GetAutomatedReasoningPolicyBuildWorkflowResponse:
    alternate_name: AutomatedReasoningPolicyBuildWorkflow
    primary_key: buildWorkflowId
    name_key: buildWorkflowId
    relations:
      policy:
        primary_model_name: AutomatedReasoningPolicy
        docstring: >-
          Return the automated reasoning policy that owns this build workflow, if any.
        transformer:
          mapping:
            policyArn: policyArn
  AutomatedReasoningPolicyTestCase:
    primary_key: testCaseId
    name_key: testCaseId
    input_shapes:
      - CreateAutomatedReasoningPolicyTestCaseRequest
      - UpdateAutomatedReasoningPolicyTestCaseRequest
  AutomatedReasoningPolicyTestResult:
    readonly: true
    primary_key: testCase
  GetAutomatedReasoningPolicyNextScenarioResponse:
    alternate_name: AutomatedReasoningPolicyNextScenario
    readonly: true
    primary_key: policyArn
    arn_key: policyArn
  GetAutomatedReasoningPolicyBuildWorkflowResultAssetsResponse:
    alternate_name: AutomatedReasoningPolicyBuildWorkflowResultAssets
    readonly: true
    primary_key: buildWorkflowId
    name_key: buildWorkflowId
    relations:
      policy:
        primary_model_name: AutomatedReasoningPolicy
        docstring: >-
          Return the automated reasoning policy that owns these build workflow assets, if any.
        transformer:
          mapping:
            policyArn: policyArn
      build_workflow:
        primary_model_name: AutomatedReasoningPolicyBuildWorkflow
        docstring: >-
          Return the automated reasoning build workflow that produced these assets, if any.
        transformer:
          mapping:
            policyArn: policyArn
            buildWorkflowId: buildWorkflowId
  GetAutomatedReasoningPolicyAnnotationsResponse:
    alternate_name: AutomatedReasoningPolicyAnnotations
    primary_key: buildWorkflowId
    name_key: policyName
    fields:
      name:
        rename: policyName
    relations:
      policy:
        primary_model_name: AutomatedReasoningPolicy
        docstring: >-
          Return the automated reasoning policy that these annotations belong to, if any.
        transformer:
          mapping:
            policyArn: policyArn
      build_workflow:
        primary_model_name: AutomatedReasoningPolicyBuildWorkflow
        docstring: >-
          Return the automated reasoning build workflow that these annotations belong to, if any.
        transformer:
          mapping:
            policyArn: policyArn
            buildWorkflowId: buildWorkflowId
  PromptRouterSummary:
    alternate_name: PromptRouter
    primary_key: promptRouterArn
    arn_key: promptRouterArn
    name_key: promptRouterName
    mixins:
      - name: PromptRouterModelMixin
        import_path: botocraft.mixins.bedrock
    relations:
      fallback_model:
        primary_model_name: FoundationModel
        docstring: >-
          Return the fallback foundation model for this prompt router, if any.
        transformer:
          mapping:
            modelId: fallbackModel.modelArn
  GetEvaluationJobResponse:
    alternate_name: EvaluationJob
    primary_key: jobArn
    arn_key: jobArn
    name_key: jobName
    fields:
      roleArn:
        required: false
        default: None
      evaluationConfig:
        python_type: Any | None
        required: false
        default: None
      inferenceConfig:
        python_type: Any | None
        required: false
        default: None
      outputDataConfig:
        python_type: Any | None
        required: false
        default: None
    relations:
      role:
        primary_model_name: IAMRole
        docstring: >-
          Return the IAM role used by this evaluation job, if any.
        transformer:
          regex:
            attribute: roleArn
            regex: >-
              ^arn:aws[a-zA-Z-]*:iam::\d+:role/(?P<RoleName>.+)$
  AccountEnforcedGuardrailOutputConfiguration:
    alternate_name: EnforcedGuardrailsConfiguration
    primary_key: configId
    name_key: configId
    relations:
      guardrail:
        primary_model_name: Guardrail
        docstring: >-
          Return the enforced guardrail, if any.
        transformer:
          mapping:
            guardrailId: guardrailId
  InferenceProfileSummary:
    alternate_name: InferenceProfile
    primary_key: inferenceProfileArn
    arn_key: inferenceProfileArn
    name_key: inferenceProfileName
    mixins:
      - name: InferenceProfileModelMixin
        import_path: botocraft.mixins.bedrock
  GetModelCustomizationJobResponse:
    alternate_name: ModelCustomizationJob
    primary_key: jobArn
    arn_key: jobArn
    name_key: jobName
    fields:
      outputModelName:
        required: false
        default: None
      roleArn:
        required: false
        default: None
      trainingDataConfig:
        required: false
        default: None
      validationDataConfig:
        required: false
        default: None
      outputDataConfig:
        required: false
        default: None
    relations:
      role:
        primary_model_name: IAMRole
        docstring: >-
          Return the IAM role used by this customization job, if any.
        transformer:
          regex:
            attribute: roleArn
            regex: >-
              ^arn:aws[a-zA-Z-]*:iam::\d+:role/(?P<RoleName>.+)$
      base_model:
        primary_model_name: FoundationModel
        docstring: >-
          Return the foundation model used for this customization job.
        transformer:
          mapping:
            modelId: baseModelArn
      output_model:
        primary_model_name: CustomModel
        docstring: >-
          Return the output custom model produced by this customization job, if any.
        transformer:
          mapping:
            modelArn: outputModelArn
      output_model_kms_key:
        primary_model_name: KMSKey
        docstring: >-
          Return the KMS key that encrypts the output model, if any.
        transformer:
          mapping:
            KeyId: outputModelKmsKeyArn
      subnets:
        primary_model_name: Subnet
        many: true
        docstring: >-
          Return the subnets configured for this customization job, if any.
        transformer:
          mapping:
            SubnetIds: vpcConfig.subnetIds
      security_groups:
        primary_model_name: SecurityGroup
        many: true
        docstring: >-
          Return the security groups configured for this customization job, if any.
        transformer:
          mapping:
            GroupIds: vpcConfig.securityGroupIds
  ModelCopyJobSummary:
    alternate_name: ModelCopyJob
    primary_key: jobArn
    arn_key: jobArn
    name_key: jobArn
  ModelInvocationJobSummary:
    alternate_name: ModelInvocationJob
    primary_key: jobArn
    arn_key: jobArn
    name_key: jobName
    relations:
      role:
        primary_model_name: IAMRole
        docstring: >-
          Return the IAM role used by this invocation job.
        transformer:
          regex:
            attribute: roleArn
            regex: >-
              ^arn:aws[a-zA-Z-]*:iam::\d+:role/(?P<RoleName>.+)$
      subnets:
        primary_model_name: Subnet
        many: true
        docstring: >-
          Return the subnets configured for this invocation job, if any.
        transformer:
          mapping:
            SubnetIds: vpcConfig.subnetIds
      security_groups:
        primary_model_name: SecurityGroup
        many: true
        docstring: >-
          Return the security groups configured for this invocation job, if any.
        transformer:
          mapping:
            GroupIds: vpcConfig.securityGroupIds
      foundation_model:
        primary_model_name: FoundationModel
        docstring: >-
          Return the foundation model invoked by this batch job.
        transformer:
          mapping:
            modelId: modelId
  LoggingConfig:
    alternate_name: ModelInvocationLoggingConfiguration
    bespoke: true
    primary_key: singletonId
    name_key: singletonId
    mixins:
      - name: ModelInvocationLoggingConfigurationModelMixin
        import_path: botocraft.mixins.bedrock
    extra_fields:
      singletonId:
        python_type: str
        default: >-
          "account"
        docstring: >-
          Singleton identity for model invocation logging configuration.
      audioDataDeliveryEnabled:
        python_type: bool | None
        default: None
      cloudWatchConfig:
        python_type: Any | None
        default: None
      embeddingDataDeliveryEnabled:
        python_type: bool | None
        default: None
      imageDataDeliveryEnabled:
        python_type: bool | None
        default: None
      s3Config:
        python_type: Any | None
        default: None
      textDataDeliveryEnabled:
        python_type: bool | None
        default: None
      videoDataDeliveryEnabled:
        python_type: bool | None
        default: None
  ResourcePolicy:
    bespoke: true
    primary_key: resourceArn
    arn_key: resourceArn
    name_key: resourceArn
    extra_fields:
      resourceArn:
        python_type: str
        required: true
        docstring: >-
          Resource ARN associated with this policy.
      resourcePolicy:
        python_type: str | None
        default: None
        docstring: >-
          JSON policy document for this resource.
  MarketplaceModelEndpoint:
    primary_key: endpointArn
    arn_key: endpointArn
    name_key: endpointArn
    fields:
      endpointConfig:
        required: false
        default: None
      endpointStatus:
        required: false
        default: None
  ProvisionedModelSummary:
    alternate_name: ProvisionedModelThroughput
    primary_key: provisionedModelArn
    arn_key: provisionedModelArn
    name_key: provisionedModelName
secondary:
  VpcConfig:
    alternate_name: BedrockVpcConfig
    force_create: true
  GetFoundationModelResponse:
    fields:
      modelDetails:
        python_type: >-
          "FoundationModel | None"
  ListFoundationModelsResponse:
    fields:
      modelSummaries:
        python_type: >-
          "builtins.list[FoundationModel] | None"
  ListCustomModelsResponse:
    fields:
      modelSummaries:
        python_type: >-
          "builtins.list[CustomModel] | None"
  ListImportedModelsResponse:
    fields:
      modelSummaries:
        python_type: >-
          "builtins.list[ImportedModel] | None"
  ListGuardrailsResponse:
    fields:
      guardrails:
        python_type: >-
          "builtins.list[Guardrail] | None"
  ListAutomatedReasoningPoliciesResponse:
    fields:
      automatedReasoningPolicySummaries:
        python_type: >-
          "builtins.list[AutomatedReasoningPolicy] | None"
  ListAutomatedReasoningPolicyBuildWorkflowsResponse:
    fields:
      automatedReasoningPolicyBuildWorkflowSummaries:
        python_type: >-
          "builtins.list[AutomatedReasoningPolicyBuildWorkflow] | None"
  GetAutomatedReasoningPolicyTestCaseResponse:
    fields:
      testCase:
        python_type: >-
          "AutomatedReasoningPolicyTestCase | None"
  GetAutomatedReasoningPolicyTestResultResponse:
    fields:
      testResult:
        python_type: >-
          "AutomatedReasoningPolicyTestResult | None"
  ListEvaluationJobsResponse:
    fields:
      jobSummaries:
        python_type: >-
          "builtins.list[EvaluationJob] | None"
  ListInferenceProfilesResponse:
    fields:
      inferenceProfileSummaries:
        python_type: >-
          "builtins.list[InferenceProfile] | None"
  ListModelCopyJobsResponse:
    fields:
      modelCopyJobSummaries:
        python_type: >-
          "builtins.list[ModelCopyJob] | None"
  ListModelCustomizationJobsResponse:
    fields:
      modelCustomizationJobSummaries:
        python_type: >-
          "builtins.list[ModelCustomizationJob] | None"
  ListModelInvocationJobsResponse:
    fields:
      invocationJobSummaries:
        python_type: >-
          "builtins.list[ModelInvocationJob] | None"
  GetModelInvocationLoggingConfigurationResponse:
    fields:
      loggingConfig:
        python_type: >-
          "ModelInvocationLoggingConfiguration | None"
  GetResourcePolicyResponse:
    alternate_name: BedrockGetResourcePolicyResponse
  PutResourcePolicyResponse:
    alternate_name: BedrockPutResourcePolicyResponse
  DeleteResourcePolicyResponse:
    alternate_name: BedrockDeleteResourcePolicyResponse
  ListMarketplaceModelEndpointsResponse:
    fields:
      marketplaceModelEndpoints:
        python_type: >-
          "builtins.list[MarketplaceModelEndpoint] | None"
  ListProvisionedModelThroughputsResponse:
    fields:
      provisionedModelSummaries:
        python_type: >-
          "builtins.list[ProvisionedModelThroughput] | None"
